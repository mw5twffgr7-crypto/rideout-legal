<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, noarchive, nofollow, noimageindex" />
  <meta name="googlebot" content="noindex, noarchive, nofollow" />
  <title>Email bestätigt – Ride Out</title>
  <style>
    :root {
      --bg: #080A0D;
      --panel: #151A21;
      --bezel: rgba(255, 255, 255, 0.075);
      --text: #EAF0F6;
      --muted: #8893A1;
      --accent: #FF5E1A;
      --accent-glow: rgba(255, 94, 26, 0.5);
      --success: #2FD16A;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .brand-strip {
      padding: 24px;
      text-align: center;
      font-size: 12px;
      letter-spacing: 0.32em;
      color: var(--accent);
      font-weight: 700;
      text-transform: uppercase;
    }
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 440px;
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--bezel);
      border-radius: 16px;
      padding: 40px 28px;
      text-align: center;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.02), 0 24px 60px rgba(0, 0, 0, 0.4);
    }
    .check-wrap {
      width: 88px;
      height: 88px;
      margin: 0 auto 24px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(47, 209, 106, 0.25), rgba(47, 209, 106, 0.05) 70%);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(47, 209, 106, 0.3);
    }
    .check-wrap svg {
      width: 44px;
      height: 44px;
    }
    h1 {
      font-size: 26px;
      margin: 0 0 12px;
      letter-spacing: -0.01em;
      color: var(--text);
    }
    p {
      color: var(--muted);
      margin: 0 0 24px;
      font-size: 15px;
    }
    .cta {
      display: inline-block;
      background: var(--accent);
      color: #140800;
      text-decoration: none;
      font-weight: 700;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 15px;
      letter-spacing: 0.02em;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 8px 24px var(--accent-glow);
    }
    .cta:hover, .cta:active {
      transform: translateY(-1px);
      box-shadow: 0 12px 32px var(--accent-glow);
    }
    .hint {
      margin-top: 20px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }
    .hint code {
      background: rgba(255, 255, 255, 0.06);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px;
      color: var(--text);
    }
    footer {
      padding: 20px 24px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }
    footer a {
      color: var(--accent);
      text-decoration: none;
      margin: 0 8px;
    }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="brand-strip">Ride Out</div>

  <main>
    <div class="card">
      <div class="check-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="#2FD16A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>

      <h1>E-Mail bestätigt</h1>
      <p>Dein Account ist jetzt aktiv. Du kannst dich in der App anmelden und loslegen.</p>

      <a href="rideout://" class="cta">Zur Ride Out App</a>

      <p class="hint">
        Wenn der Button nicht funktioniert, öffne die Ride&nbsp;Out App manuell auf deinem Gerät und melde dich mit deiner E-Mail an.
      </p>
    </div>
  </main>

  <footer>
    <a href="datenschutz.html">Datenschutz</a>·<a href="impressum.html">Impressum</a>
  </footer>
</body>
</html>
